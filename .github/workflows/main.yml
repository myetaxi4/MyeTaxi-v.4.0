name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Regenerate Android project if missing
        run: |
          if [ ! -d "android" ]; then
            echo "Android folder missing — regenerating..."
            flutter create --platforms android .
          fi

      - name: Fix compileSdk and targetSdk to 35
        run: |
          sed -i 's/compileSdk.*=.*/compileSdk = 35/' android/app/build.gradle || true
          sed -i 's/compileSdkVersion.*/compileSdkVersion 35/' android/app/build.gradle || true
          sed -i 's/targetSdkVersion.*/targetSdkVersion 35/' android/app/build.gradle || true
          sed -i 's/targetSdk.*=.*/targetSdk = 35/' android/app/build.gradle || true

      - name: Fix notification_service Color conflict
        run: |
          if grep -q "class Color {" lib/services/notification_service.dart 2>/dev/null; then
            sed -i "1s|^|import 'dart:ui' show Color;\n|" lib/services/notification_service.dart
            sed -i '/^\/\/ Needed for color/,/^}$/d' lib/services/notification_service.dart
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Fix telephony namespace
        run: |
          TELEPHONY_BUILD=$(find ~/.pub-cache -path "*/telephony*/android/build.gradle" | head -1)
          if [ -n "$TELEPHONY_BUILD" ]; then
            if ! grep -q "namespace" "$TELEPHONY_BUILD"; then
              sed -i "s/android {/android {\n    namespace 'com.shounakmulay.telephony'/" "$TELEPHONY_BUILD"
              echo "Patched: $TELEPHONY_BUILD"
            fi
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

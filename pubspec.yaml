name: myetaxi_tracker
description: MyeTaxi Tracker v1.0 - Professional GPS Fleet Management Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.6.0

  # State Management
  flutter_riverpod: ^2.4.9

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0

  # SMS
  telephony: ^0.2.0

  # Networking
  dio: ^5.4.0
  http: ^1.1.0
  web_socket_channel: ^2.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  fl_chart: ^0.66.2
  badges: ^3.1.2
  shimmer: ^3.0.0

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  image_picker: ^1.0.7
  permission_handler: ^11.2.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  package_info_plus: ^5.0.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
